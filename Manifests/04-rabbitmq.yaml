apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: orchestrator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: killux3k/billing-queue:1.0.0
          ports:
            - containerPort: 5672
          envFrom:
            - secretRef:
                name: rabbitmq-credentials
          volumeMounts:
            - name: rabbitmq-data
              mountPath: /var/lib/rabbitmq
      volumes:
        - name: rabbitmq-data 
          persistentVolumeClaim:
            claimName: rabbitmq-pvc 
          

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: rabbitmq-pvc 
  namespace: orchestrator
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi

---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq-svc
  namespace: orchestrator
spec:
  selector:
    app: rabbitmq
  ports:
    - port: 5672
      targetPort: 5672